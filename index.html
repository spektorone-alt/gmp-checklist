<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>בדיקת GMP יומית</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap');

:root{
  --bg:#F6F4EF;
  --card:#FFFFFF;
  --border:#E5DECF;
  --ink:#23282B;
  --ink-soft:#6B7278;
  --brand:#2B4C56;
  --brand-dark:#1D363E;
  --ok:#3F7D5C;
  --ok-bg:#E7F2EC;
  --fail:#C1443D;
  --fail-bg:#FBEAE9;
  --na:#8F887A;
  --na-bg:#EFEBE2;
  --amber:#C99A3B;
  --radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Heebo',sans-serif;
  -webkit-font-smoothing:antialiased;
  padding-bottom:60px;
}
.topbar{
  background:linear-gradient(135deg,var(--brand) 0%,var(--brand-dark) 100%);
  color:#fff;
  padding:22px 18px 26px;
  position:relative;
  overflow:hidden;
}
.topbar::after{
  content:"";
  position:absolute;
  inset:0;
  background-image:radial-gradient(circle at 85% 20%, rgba(255,255,255,0.08) 0, transparent 45%);
}
.topbar-inner{position:relative;max-width:520px;margin:0 auto;}
.brand-row{display:flex;align-items:center;gap:12px;}
.brand-logo{
  width:56px;height:56px;border-radius:50%;background:#fff;
  flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.2);
  object-fit:contain;padding:3px;
}
.topbar h1{margin:0;font-size:19px;font-weight:800;letter-spacing:.2px;line-height:1.3;}
.topbar .subtitle{margin:4px 0 0;font-size:13px;opacity:.85;font-weight:500;}
.legend{
  margin-top:12px;
  font-size:11.5px;
  opacity:.9;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}
.legend span{display:inline-flex;align-items:center;gap:4px;}
.legend b{
  display:inline-flex;align-items:center;justify-content:center;
  width:16px;height:16px;border-radius:5px;font-size:10px;font-weight:700;
}
.container{max-width:520px;margin:0 auto;padding:16px;}

.tabs-bar{
  display:flex;gap:8px;margin-bottom:14px;
  background:#EFEAE0;border-radius:12px;padding:4px;
}
.tab-btn{
  flex:1;font-family:'Heebo',sans-serif;font-size:13.5px;font-weight:700;
  background:transparent;border:none;border-radius:9px;
  padding:10px 8px;color:var(--ink-soft);cursor:pointer;
  transition:all .18s ease;
}
.tab-btn.active{background:#fff;color:var(--brand-dark);box-shadow:0 1px 4px rgba(30,25,10,0.1);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 1px 2px rgba(30,25,10,0.04);
}
.card h2{margin:0 0 12px;font-size:15px;font-weight:700;color:var(--brand-dark);}

.meta-row{display:flex;flex-direction:column;gap:10px;}
.meta-row label{
  font-size:12.5px;font-weight:600;color:var(--ink-soft);
  display:flex;flex-direction:column;gap:4px;
}
.meta-row input[type=text],.meta-row input[type=date]{
  font-family:'Heebo',sans-serif;
  font-size:14.5px;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid var(--border);
  background:#FCFBF8;
  color:var(--ink);
}
.meta-row input:focus{outline:2px solid var(--brand);outline-offset:1px;}

.progress-wrap{display:flex;align-items:center;gap:10px;margin-top:14px;}
.progress-bar{flex:1;height:8px;border-radius:6px;background:#EDE8DC;overflow:hidden;}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--amber),var(--ok));transition:width .35s ease;}
#progressLabel{font-size:12.5px;font-weight:700;color:var(--brand-dark);min-width:34px;text-align:left;}

.history-row{display:flex;gap:8px;margin-top:14px;}
.history-row select{
  flex:1;font-family:'Heebo',sans-serif;font-size:13px;padding:9px 10px;
  border-radius:10px;border:1px solid var(--border);background:#FCFBF8;color:var(--ink);
}
.btn-ghost{
  font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;
  border:1px solid var(--border);background:#fff;color:var(--brand-dark);
  border-radius:10px;padding:9px 14px;cursor:pointer;
}
.btn-ghost:active{transform:scale(.97);}

.section-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  margin-bottom:10px;
  overflow:hidden;
}
.section-header{
  width:100%;
  display:flex;align-items:center;gap:10px;
  background:none;border:none;
  padding:14px 16px;
  font-family:'Heebo',sans-serif;
  cursor:pointer;
  text-align:right;
}
.section-dot{width:9px;height:9px;border-radius:50%;background:var(--na);flex-shrink:0;}
.section-title{flex:1;font-size:14.5px;font-weight:700;color:var(--ink);}
.section-count{font-size:12px;font-weight:700;color:var(--ink-soft);background:#F1EEE5;padding:3px 8px;border-radius:20px;}
.chev{font-size:14px;color:var(--ink-soft);transition:transform .2s ease;}
.section-card.open .chev{transform:rotate(180deg);}
.section-body{
  max-height:0;
  overflow:hidden;
  transition:max-height .3s ease;
  border-top:1px solid transparent;
}
.section-card.open .section-body{border-top:1px solid var(--border);}

.item-row{padding:12px 16px;border-bottom:1px solid #F1EEE5;}
.item-row:last-child{border-bottom:none;}
.item-name{font-size:13.5px;font-weight:600;margin-bottom:10px;}
.item-checks{display:flex;flex-direction:column;gap:8px;}
.dim-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.dim-label{font-size:12.5px;font-weight:600;color:var(--ink-soft);flex:1;}
.dim-btn{
  min-width:96px;height:36px;border-radius:9px;padding:0 12px;
  border:1.5px solid var(--border);
  background:#FCFBF8;
  font-family:'Heebo',sans-serif;
  font-size:12.5px;font-weight:700;
  color:var(--ink-soft);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s ease;
  flex-shrink:0;
}
.dim-btn:active{transform:scale(.95);}
.dim-btn[data-state="ok"]{background:var(--ok-bg);border-color:var(--ok);color:var(--ok);}
.dim-btn[data-state="fail"]{background:var(--fail-bg);border-color:var(--fail);color:var(--fail);}
.dim-btn[data-state="na"]{background:var(--na-bg);border-color:var(--na);color:var(--na);}
.note-toggle-row{display:flex;justify-content:flex-end;margin-top:6px;}
.note-toggle{
  width:auto;height:32px;border-radius:16px;border:1.5px dashed var(--border);
  background:#FCFBF8;font-size:12px;font-weight:600;cursor:pointer;color:var(--ink-soft);
  padding:0 14px;display:flex;align-items:center;gap:5px;
}
.note-toggle.has-note{border-style:solid;border-color:var(--amber);color:var(--amber);background:#FBF4E3;}
.item-note{
  margin-top:8px;width:100%;min-height:44px;
  font-family:'Heebo',sans-serif;font-size:13px;
  border:1px solid var(--border);border-radius:8px;padding:8px 10px;
  resize:vertical;background:#FCFBF8;color:var(--ink);
}
.item-note.hidden{display:none;}

.deficiencies-list{display:flex;flex-direction:column;gap:10px;}
.deficiency-item{
  background:var(--fail-bg);border:1px solid #EFC7C4;border-radius:10px;padding:10px 12px;
}
.deficiency-item .d-top{display:flex;justify-content:space-between;gap:8px;font-size:13px;font-weight:700;color:var(--fail);}
.deficiency-item .d-section{font-size:11.5px;color:var(--ink-soft);font-weight:600;margin-top:2px;}
.deficiency-item .d-note{font-size:12.5px;color:var(--ink);margin-top:6px;}
.empty-msg{font-size:13px;color:var(--ink-soft);text-align:center;padding:6px 0;}

.sig-grid{display:flex;flex-direction:column;gap:18px;}
.sig-block label.sig-name-label{font-size:12.5px;font-weight:600;color:var(--ink-soft);display:flex;flex-direction:column;gap:4px;margin-bottom:8px;}
.sig-block input{
  font-family:'Heebo',sans-serif;font-size:14px;padding:10px 12px;
  border-radius:10px;border:1px solid var(--border);background:#FCFBF8;color:var(--ink);
}
.sig-pad-wrap{
  border:1.5px dashed var(--border);border-radius:10px;
  background:#FCFBF8;position:relative;overflow:hidden;
}
.sig-pad-wrap canvas{
  width:100%;height:120px;display:block;touch-action:none;cursor:crosshair;
}
.sig-pad-placeholder{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:12px;color:var(--ink-soft);opacity:.6;pointer-events:none;
}
.sig-pad-footer{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.sig-status{font-size:11.5px;font-weight:600;color:var(--ink-soft);}
.sig-status.signed{color:var(--ok);}
.sig-clear{
  font-family:'Heebo',sans-serif;font-size:11.5px;font-weight:700;
  background:none;border:1px solid var(--border);border-radius:16px;
  padding:4px 12px;color:var(--ink-soft);cursor:pointer;
}
.btn-export{
  display:block;width:100%;margin-top:10px;
  font-family:'Heebo',sans-serif;font-size:15px;font-weight:800;
  background:#fff;color:var(--brand-dark);border:1.5px solid var(--brand);border-radius:12px;
  padding:14px;cursor:pointer;
}
.btn-export:active{transform:scale(.98);}
.btn-drive{
  margin-top:10px;
  background:var(--brand-dark);color:#fff;border:none;
}
.btn-drive:disabled{opacity:.6;cursor:default;}

.btn-save{
  display:block;width:100%;
  font-family:'Heebo',sans-serif;font-size:15.5px;font-weight:800;
  background:var(--brand);color:#fff;border:none;border-radius:12px;
  padding:15px;cursor:pointer;box-shadow:0 4px 14px rgba(43,76,86,0.25);
}
.btn-save:active{transform:scale(.98);}

.toast{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(0);
  background:var(--brand-dark);color:#fff;font-size:13.5px;font-weight:600;
  padding:11px 20px;border-radius:30px;box-shadow:0 6px 18px rgba(0,0,0,0.2);
  transition:opacity .25s ease, transform .25s ease;
  z-index:50;
}
.toast.hidden{opacity:0;pointer-events:none;transform:translateX(-50%) translateY(10px);}

.stamp{
  position:fixed;inset:0;background:rgba(35,40,43,0.45);
  display:flex;align-items:center;justify-content:center;z-index:100;
  transition:opacity .2s ease;
}
.stamp.hidden{opacity:0;pointer-events:none;}
.stamp-ring{
  width:190px;height:190px;border-radius:50%;
  border:5px solid var(--amber);
  background:#fff;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transform:rotate(-8deg) scale(0.7);
  animation:stampIn .45s cubic-bezier(.2,1.4,.4,1) forwards;
  box-shadow:0 10px 30px rgba(0,0,0,0.25);
}
@keyframes stampIn{
  0%{transform:rotate(-8deg) scale(0.5);opacity:0;}
  60%{transform:rotate(-8deg) scale(1.06);opacity:1;}
  100%{transform:rotate(-8deg) scale(1);opacity:1;}
}
.stamp-text{font-size:20px;font-weight:800;color:var(--amber);letter-spacing:.5px;}
.stamp-date{font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-top:6px;}
.stamp-close{
  margin-top:12px;font-family:'Heebo',sans-serif;font-size:12px;font-weight:700;
  background:var(--brand);color:#fff;border:none;border-radius:20px;padding:6px 16px;cursor:pointer;
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand-row">
      <img class="brand-logo" id="brandLogo" alt="לוגו אדר בצקים">
      <div>
        <h1>טופס GMP – ניקיון ותקינות סביבת עבודה</h1>
        <p class="subtitle">מפעל לייצור בצקים קפואים · בדיקה יומית</p>
      </div>
    </div>
    <div class="legend">
      <span><b style="background:var(--ok-bg);color:var(--ok);">✔</b>תקין</span>
      <span><b style="background:var(--fail-bg);color:var(--fail);">✖</b>לא תקין</span>
      <span><b style="background:var(--na-bg);color:var(--na);font-size:8px;">NA</b>לא רלוונטי</span>
    </div>
  </div>
</div>

<div class="container">

  <div class="card">
    <div class="meta-row">
      <label>תאריך <input type="date" id="inpDate"></label>
      <label>מבצע בדיקה <input type="text" id="inpInspector" placeholder="שם מלא"></label>
      <label>איכות <input type="text" id="inpQuality" placeholder="שם מלא"></label>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <span id="progressLabel">0%</span>
    </div>
    <div class="history-row">
      <select id="historySelect"><option value="">📂 טעינת בדיקה קודמת…</option></select>
      <button id="newBtn" class="btn-ghost">חדש</button>
    </div>
  </div>

  <div class="tabs-bar" id="tabsBar"></div>
  <div id="sectionsContainer"></div>

  <div class="card">
    <h2>ליקויים ופעולות מתקנות</h2>
    <div class="deficiencies-list" id="deficienciesList"></div>
    <p class="empty-msg" id="deficienciesEmpty">אין ליקויים פתוחים 🎉</p>
  </div>

  <div class="card">
    <h2>חתימות</h2>
    <div class="sig-grid" id="sigGrid"></div>
  </div>

  <button class="btn-save" id="saveBtn">שמירת בדיקה</button>
  <button class="btn-export" id="exportBtn">📊 ייצוא לאקסל</button>
  <button class="btn-export btn-drive" id="driveBtn">📁 שמירה לדרייב</button>
</div>

<div class="toast hidden" id="toast"></div>
<div class="stamp hidden" id="stamp">
  <div class="stamp-ring">
    <span class="stamp-text">נבדק ואושר</span>
    <span class="stamp-date" id="stampDate"></span>
    <button class="stamp-close" id="stampClose">סגירה</button>
  </div>
</div>

<script>
(function(){
  if(window.storage) return; // running inside Claude - use the real API
  console.info('מצב עצמאי: הנתונים נשמרים באחסון המקומי של הדפדפן הזה בלבד.');
  window.storage = {
    async get(key){
      try{
        const raw = localStorage.getItem(key);
        if(raw===null) return null;
        return {key, value: raw, shared:false};
      }catch(e){ return null; }
    },
    async set(key, value){
      try{
        localStorage.setItem(key, value);
        return {key, value, shared:false};
      }catch(e){ return null; }
    },
    async delete(key){
      try{
        const existed = localStorage.getItem(key) !== null;
        localStorage.removeItem(key);
        return {key, deleted: existed, shared:false};
      }catch(e){ return null; }
    },
    async list(prefix){
      try{
        prefix = prefix || '';
        const keys = [];
        for(let i=0;i<localStorage.length;i++){
          const k = localStorage.key(i);
          if(k.indexOf(prefix)===0) keys.push(k);
        }
        return {keys, prefix, shared:false};
      }catch(e){ return {keys:[]}; }
    }
  };
})();

const TABS = [
  {id:'main', label:'כללי'},
  {id:'baking', label:'אפייה והתפחה'},
];
const SECTIONS = [
  {id:'general', tab:'main', title:'מדור GMP כללי – סביבה חיצונית', items:['היעדר צמחייה חריגה','פחים חיצוניים','שירותים','חדר אוכל עובדים','מעברים פנויים','עמדות שטיפת ידיים']},
  {id:'rawmat', tab:'main', title:'מדור חומרי גלם', items:['רצפה','קירות','תקרה','ניקוזים','משטחי אחסון','היעדר מזיקים','חרקנים תקינים ונקיים']},
  {id:'kneading', tab:'main', title:'מדור לישה', items:['מלוש / מיקסר','מסוע בצק','רצפה','קירות','תקרה','ניקוזים','היעדר שאריות בצק / קמח']},
  {id:'dividing', tab:'main', title:'מדור חלוקה וכדרור', items:['מחלק בצק','מכדררת','מסועים','שולחנות עבודה','רצפה']},
  {id:'proofing', tab:'baking', title:'מדור התפחה', items:['תא התפחה','מגשים / עגלות','מאווררים','רצפה','ניקוזים']},
  {id:'baking', tab:'baking', title:'מדור אפייה חלקית / מלאה', items:['תנור','מסוע תנור','מגשים / עגלות','קולט אדים','רצפה','ניקוזים']},
  {id:'cooling', tab:'main', title:'הקפאה מהירה - שוק', items:['מסוע צינון','מאווררים','היעדר עיבוי','שוק פריזר','עגלות הקפאה']},
  {id:'packaging', tab:'main', title:'מדור אריזה וסימון', items:['מכונת אריזה','שולחנות אריזה','חומרי אריזה','רצפה','קירות']},
  {id:'warehouse', tab:'main', title:'מדור מחסן תוצ"ג קפוא', items:['חדר קפוא','משטחים','סימון אצוות','היעדר קרטונים פגומים']},
];
const DIMS = [
  {key:'clean', label:'ניקיון', title:'ניקיון'},
  {key:'integrity', label:'תקינות', title:'תקינות'},
  {key:'rust', label:'היעדר חלודה/קילופים/שברים', title:'היעדר חלודה/קילופים/שברים'},
];

const SIG_ROLES = [
  {key:'inspector', label:'מבצע בדיקה'},
];

function emptySignatures(){
  const s = {};
  SIG_ROLES.forEach(r=>{ s[r.key]=''; s[r.key+'Sig']=''; });
  return s;
}

let data = {inspector:'', quality:'', sections:{}, signatures:emptySignatures()};

function emptySections(){
  const s = {};
  SECTIONS.forEach(sec=>{
    s[sec.id] = {};
    sec.items.forEach(it=>{
      s[sec.id][it] = {clean:'', integrity:'', rust:'', note:''};
    });
  });
  return s;
}

function todayISO(){
  const d = new Date();
  const off = d.getTimezoneOffset();
  return new Date(d.getTime()-off*60000).toISOString().slice(0,10);
}

function currentDateKey(){
  return document.getElementById('inpDate').value || todayISO();
}

function resetData(){
  data = {inspector:'', quality:'', sections:emptySections(), signatures:emptySignatures()};
}

function renderTabsBar(){
  const bar = document.getElementById('tabsBar');
  bar.innerHTML = '';
  TABS.forEach((tab, idx)=>{
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (idx===0 ? ' active' : '');
    btn.textContent = tab.label;
    btn.dataset.tab = tab.id;
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel_'+tab.id).classList.add('active');
    });
    bar.appendChild(btn);
  });
}

function renderSections(){
  const c = document.getElementById('sectionsContainer');
  c.innerHTML = '';
  const panels = {};
  TABS.forEach((tab, idx)=>{
    const panel = document.createElement('div');
    panel.className = 'tab-panel' + (idx===0 ? ' active' : '');
    panel.id = 'panel_'+tab.id;
    c.appendChild(panel);
    panels[tab.id] = panel;
  });
  SECTIONS.forEach(sec=>{
    const card = document.createElement('div');
    card.className = 'section-card';
    card.dataset.id = sec.id;

    const header = document.createElement('button');
    header.className = 'section-header';
    header.innerHTML = `<span class="section-dot"></span><span class="section-title">${sec.title}</span><span class="section-count"></span><span class="chev">⌄</span>`;
    header.addEventListener('click', ()=>{
      card.classList.toggle('open');
      const body = card.querySelector('.section-body');
      body.style.maxHeight = card.classList.contains('open') ? body.scrollHeight + 'px' : '0';
    });
    card.appendChild(header);

    const body = document.createElement('div');
    body.className = 'section-body';

    sec.items.forEach(itemName=>{
      const row = document.createElement('div');
      row.className = 'item-row';

      const nameEl = document.createElement('div');
      nameEl.className = 'item-name';
      nameEl.textContent = itemName;
      row.appendChild(nameEl);

      const checksEl = document.createElement('div');
      checksEl.className = 'item-checks';

      DIMS.forEach(dim=>{
        const dimRow = document.createElement('div');
        dimRow.className = 'dim-row';
        const label = document.createElement('span');
        label.className = 'dim-label';
        label.textContent = dim.label;
        const btn = document.createElement('button');
        btn.className = 'dim-btn';
        btn.title = dim.title;
        btn.dataset.state = '';
        btn.textContent = STATE_ICON[''];
        btn.addEventListener('click', ()=>{
          const cur = data.sections[sec.id][itemName][dim.key];
          const next = STATE_ORDER[(STATE_ORDER.indexOf(cur)+1) % STATE_ORDER.length];
          data.sections[sec.id][itemName][dim.key] = next;
          btn.dataset.state = next;
          btn.textContent = STATE_ICON[next];
          updateSectionHeader(sec.id, card);
          updateProgress();
          renderDeficiencies();
        });
        dimRow.appendChild(label);
        dimRow.appendChild(btn);
        checksEl.appendChild(dimRow);
      });

      row.appendChild(checksEl);

      const noteToggleRow = document.createElement('div');
      noteToggleRow.className = 'note-toggle-row';
      const noteToggle = document.createElement('button');
      noteToggle.className = 'note-toggle';
      noteToggle.innerHTML = '📝 הוספת הערה';
      noteToggleRow.appendChild(noteToggle);
      row.appendChild(noteToggleRow);

      const noteArea = document.createElement('textarea');
      noteArea.className = 'item-note hidden';
      noteArea.placeholder = 'הערה...';
      noteArea.addEventListener('input', ()=>{
        data.sections[sec.id][itemName].note = noteArea.value;
        noteToggle.classList.toggle('has-note', !!noteArea.value.trim());
        renderDeficiencies();
      });
      noteToggle.addEventListener('click', ()=>{
        noteArea.classList.toggle('hidden');
        noteArea.focus();
      });
      row.appendChild(noteArea);

      row.dataset.item = itemName;
      row.dataset.section = sec.id;
      body.appendChild(row);
    });

    card.appendChild(body);
    panels[sec.tab].appendChild(card);
    updateSectionHeader(sec.id, card);
  });
}

function renderSignatures(){
  const grid = document.getElementById('sigGrid');
  grid.innerHTML = '';
  SIG_ROLES.forEach(role=>{
    const block = document.createElement('div');
    block.className = 'sig-block';
    block.innerHTML = `
      <label class="sig-name-label">${role.label}
        <input type="text" id="sigName_${role.key}" placeholder="שם מלא">
      </label>
      <div class="sig-pad-wrap">
        <canvas id="sigPad_${role.key}"></canvas>
        <span class="sig-pad-placeholder" id="sigPlaceholder_${role.key}">חתימה כאן</span>
      </div>
      <div class="sig-pad-footer">
        <span class="sig-status" id="sigStatus_${role.key}">לא נחתם</span>
        <button type="button" class="sig-clear" data-role="${role.key}">ניקוי חתימה</button>
      </div>
    `;
    grid.appendChild(block);
  });

  SIG_ROLES.forEach(role=>{
    const canvas = document.getElementById('sigPad_'+role.key);
    setupSignaturePad(canvas, role.key);
  });

  grid.querySelectorAll('.sig-clear').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      clearSignaturePad(btn.dataset.role);
    });
  });
}

function fitCanvas(canvas){
  const ratio = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * ratio;
  canvas.height = rect.height * ratio;
  const ctx = canvas.getContext('2d');
  ctx.scale(ratio, ratio);
  ctx.lineWidth = 2.2;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#23282B';
  return ctx;
}

function setupSignaturePad(canvas, roleKey){
  let ctx = fitCanvas(canvas);
  let drawing = false;
  let last = null;

  function pos(e){
    const rect = canvas.getBoundingClientRect();
    const p = e.touches ? e.touches[0] : e;
    return { x: p.clientX - rect.left, y: p.clientY - rect.top };
  }
  function start(e){
    e.preventDefault();
    drawing = true;
    last = pos(e);
    document.getElementById('sigPlaceholder_'+roleKey).style.display = 'none';
  }
  function move(e){
    if(!drawing) return;
    e.preventDefault();
    const p = pos(e);
    ctx.beginPath();
    ctx.moveTo(last.x, last.y);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    last = p;
  }
  function end(){
    if(!drawing) return;
    drawing = false;
    data.signatures[roleKey+'Sig'] = canvas.toDataURL('image/png');
    const status = document.getElementById('sigStatus_'+roleKey);
    status.textContent = 'נחתם ✓';
    status.classList.add('signed');
  }
  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  window.addEventListener('mouseup', end);
  canvas.addEventListener('touchstart', start, {passive:false});
  canvas.addEventListener('touchmove', move, {passive:false});
  canvas.addEventListener('touchend', end);

  canvas._ctxRef = () => ctx;
  canvas._refit = () => { ctx = fitCanvas(canvas); };
}

function clearSignaturePad(roleKey){
  const canvas = document.getElementById('sigPad_'+roleKey);
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  data.signatures[roleKey+'Sig'] = '';
  document.getElementById('sigPlaceholder_'+roleKey).style.display = 'block';
  const status = document.getElementById('sigStatus_'+roleKey);
  status.textContent = 'לא נחתם';
  status.classList.remove('signed');
}

function drawSignatureImage(roleKey, dataUrl){
  const canvas = document.getElementById('sigPad_'+roleKey);
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = ()=>{
    const ratio = window.devicePixelRatio || 1;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width/ratio, canvas.height/ratio);
  };
  img.src = dataUrl;
}

function updateSectionHeader(secId, card){
  const sec = SECTIONS.find(s=>s.id===secId);
  const items = data.sections[secId];
  let filled=0, total=sec.items.length*3, anyFail=false, anyFilled=false;
  sec.items.forEach(it=>{
    DIMS.forEach(d=>{
      const v = items[it][d.key];
      if(v){ filled++; anyFilled=true; }
      if(v==='fail') anyFail=true;
    });
  });
  card.querySelector('.section-count').textContent = `${filled}/${total}`;
  const dot = card.querySelector('.section-dot');
  if(anyFail) dot.style.background = 'var(--fail)';
  else if(filled===total && total>0) dot.style.background = 'var(--ok)';
  else if(anyFilled) dot.style.background = 'var(--amber)';
  else dot.style.background = 'var(--na)';
}

function updateProgress(){
  let filled=0, total=0;
  SECTIONS.forEach(sec=>{
    sec.items.forEach(it=>{
      DIMS.forEach(d=>{
        total++;
        if(data.sections[sec.id][it][d.key]) filled++;
      });
    });
  });
  const pct = total ? Math.round(filled/total*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = pct+'%';
  return pct;
}

function renderDeficiencies(){
  const list = document.getElementById('deficienciesList');
  const emptyMsg = document.getElementById('deficienciesEmpty');
  list.innerHTML = '';
  let count = 0;
  SECTIONS.forEach(sec=>{
    sec.items.forEach(itemName=>{
      const item = data.sections[sec.id][itemName];
      const failedDims = DIMS.filter(d=>item[d.key]==='fail').map(d=>d.title);
      if(failedDims.length){
        count++;
        const el = document.createElement('div');
        el.className = 'deficiency-item';
        el.innerHTML = `
          <div class="d-top"><span>${itemName}</span><span>${failedDims.join(', ')}</span></div>
          <div class="d-section">${sec.title}</div>
          ${item.note ? `<div class="d-note">${escapeHtml(item.note)}</div>` : '<div class="d-note" style="color:var(--ink-soft);">אין הערה — יש להוסיף פעולה מתקנת</div>'}
        `;
        list.appendChild(el);
      }
    });
  });
  emptyMsg.style.display = count ? 'none' : 'block';
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function loadDataIntoForm(){
  document.getElementById('inpInspector').value = data.inspector || '';
  document.getElementById('inpQuality').value = data.quality || '';
  SIG_ROLES.forEach(role=>{
    const nameInput = document.getElementById('sigName_'+role.key);
    if(nameInput) nameInput.value = data.signatures[role.key] || '';
    const sigData = data.signatures[role.key+'Sig'];
    const status = document.getElementById('sigStatus_'+role.key);
    const placeholder = document.getElementById('sigPlaceholder_'+role.key);
    if(sigData){
      drawSignatureImage(role.key, sigData);
      if(placeholder) placeholder.style.display = 'none';
      if(status){ status.textContent = 'נחתם ✓'; status.classList.add('signed'); }
    } else {
      clearSignaturePad(role.key);
    }
  });

  document.querySelectorAll('.section-card').forEach(card=>{
    const secId = card.dataset.id;
    card.querySelectorAll('.item-row').forEach(row=>{
      const itemName = row.dataset.item;
      const itemData = data.sections[secId][itemName];
      row.querySelectorAll('.dim-btn').forEach((btn, idx)=>{
        const dimKey = DIMS[idx].key;
        const v = itemData[dimKey] || '';
        btn.dataset.state = v;
        btn.textContent = STATE_ICON[v];
      });
      const noteArea = row.querySelector('.item-note');
      const noteToggle = row.querySelector('.note-toggle');
      noteArea.value = itemData.note || '';
      if(itemData.note){
        noteArea.classList.remove('hidden');
        noteToggle.classList.add('has-note');
      } else {
        noteArea.classList.add('hidden');
        noteToggle.classList.remove('has-note');
      }
    });
    updateSectionHeader(secId, card);
  });
  updateProgress();
  renderDeficiencies();
}

async function loadEntry(dateKey){
  try{
    const res = await window.storage.get('gmp-entry:'+dateKey, false);
    if(res && res.value){
      const parsed = JSON.parse(res.value);
      data = {
        inspector: parsed.inspector||'',
        quality: parsed.quality||'',
        sections: parsed.sections || emptySections(),
        signatures: Object.assign(emptySignatures(), parsed.signatures || {})
      };
      SECTIONS.forEach(sec=>{
        if(!data.sections[sec.id]) data.sections[sec.id] = {};
        sec.items.forEach(it=>{
          if(!data.sections[sec.id][it]) data.sections[sec.id][it] = {clean:'',integrity:'',rust:'',note:''};
        });
      });
      return true;
    }
  }catch(e){}
  resetData();
  return false;
}

async function saveEntry(){
  const dateKey = currentDateKey();
  data.inspector = document.getElementById('inpInspector').value;
  data.quality = document.getElementById('inpQuality').value;
  SIG_ROLES.forEach(role=>{
    const nameInput = document.getElementById('sigName_'+role.key);
    if(nameInput) data.signatures[role.key] = nameInput.value;
  });
  data.savedAt = new Date().toISOString();

  try{
    const result = await window.storage.set('gmp-entry:'+dateKey, JSON.stringify(data), false);
    if(!result){
      showToast('שגיאה בשמירה, נסה שוב');
      return;
    }
    showToast('הבדיקה נשמרה בהצלחה');
    await refreshHistory();
    const pct = updateProgress();
    if(pct===100){
      showStamp(dateKey);
    }
  }catch(e){
    showToast('שגיאה בשמירה, נסה שוב');
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(()=> t.classList.add('hidden'), 2400);
}

function showStamp(dateKey){
  document.getElementById('stampDate').textContent = dateKey;
  document.getElementById('stamp').classList.remove('hidden');
}
document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('stampClose').addEventListener('click', ()=>{
    document.getElementById('stamp').classList.add('hidden');
  });
});

async function refreshHistory(){
  const sel = document.getElementById('historySelect');
  const currentVal = sel.value;
  sel.innerHTML = '<option value="">📂 טעינת בדיקה קודמת…</option>';
  try{
    const res = await window.storage.list('gmp-entry:', false);
    if(res && res.keys){
      const dates = res.keys.map(k=>k.replace('gmp-entry:','')).sort().reverse();
      dates.forEach(d=>{
        const opt = document.createElement('option');
        opt.value = d;
        opt.textContent = d;
        sel.appendChild(opt);
      });
    }
  }catch(e){}
  sel.value = currentVal;
}

const STATE_HEBREW = {'':'', ok:'תקין', fail:'לא תקין', na:'לא רלוונטי'};
const DRIVE_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbxcclnw1-8haLbepKYHmfu7OdWU6HWdsF-wSAWh6NcpfrLTRLhpB16bS5NqUsyueByD-Q/exec";

function buildWorkbook(){
  const dateKey = currentDateKey();
  data.inspector = document.getElementById('inpInspector').value;
  data.quality = document.getElementById('inpQuality').value;
  SIG_ROLES.forEach(role=>{
    const nameInput = document.getElementById('sigName_'+role.key);
    if(nameInput) data.signatures[role.key] = nameInput.value;
  });

  const wb = XLSX.utils.book_new();

  const headerRows = [
    ['טופס GMP – בדיקת ניקיון ותקינות סביבת עבודה יומי'],
    ['מפעל לייצור בצקים קפואים'],
    [],
    ['תאריך', dateKey],
    ['מבצע בדיקה', data.inspector || ''],
    ['איכות', data.quality || ''],
    []
  ];
  const tableHeader = ['מדור', 'פריט לבדיקה', 'ניקיון', 'תקינות', 'היעדר חלודה/קילופים/שברים', 'הערות'];
  const rows = [tableHeader];
  SECTIONS.forEach(sec=>{
    sec.items.forEach(itemName=>{
      const it = data.sections[sec.id][itemName];
      rows.push([
        sec.title, itemName,
        STATE_HEBREW[it.clean]||'', STATE_HEBREW[it.integrity]||'', STATE_HEBREW[it.rust]||'',
        it.note || ''
      ]);
    });
  });
  const ws1 = XLSX.utils.aoa_to_sheet([...headerRows, ...rows]);
  ws1['!cols'] = [{wch:26},{wch:26},{wch:12},{wch:12},{wch:24},{wch:30}];
  XLSX.utils.book_append_sheet(wb, ws1, 'בדיקת GMP');

  const defRows = [['מדור', 'פריט', 'סוג הליקוי', 'הערה / פעולה מתקנת']];
  SECTIONS.forEach(sec=>{
    sec.items.forEach(itemName=>{
      const it = data.sections[sec.id][itemName];
      const failed = DIMS.filter(d=>it[d.key]==='fail').map(d=>d.title);
      if(failed.length){
        defRows.push([sec.title, itemName, failed.join(', '), it.note || '']);
      }
    });
  });
  const ws2 = XLSX.utils.aoa_to_sheet(defRows);
  ws2['!cols'] = [{wch:26},{wch:26},{wch:30},{wch:34}];
  XLSX.utils.book_append_sheet(wb, ws2, 'ליקויים ופעולות מתקנות');

  const sigRows = [
    ['תפקיד', 'שם', 'סטטוס חתימה'],
    ...SIG_ROLES.map(role=>[role.label, data.signatures[role.key]||'', data.signatures[role.key+'Sig'] ? 'נחתם על גבי המסך' : 'לא נחתם'])
  ];
  const ws3 = XLSX.utils.aoa_to_sheet(sigRows);
  ws3['!cols'] = [{wch:18},{wch:24},{wch:22}];
  XLSX.utils.book_append_sheet(wb, ws3, 'חתימות');

  return {wb, fileName: `GMP_${dateKey}.xlsx`};
}

async function exportToExcel(){
  if(typeof XLSX === 'undefined'){
    showToast('שגיאה בטעינת ספריית האקסל');
    return;
  }
  const {wb, fileName} = buildWorkbook();
  const wbout = XLSX.write(wb, {bookType:'xlsx', type:'array'});
  const blob = new Blob([wbout], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});

  try{
    const file = new File([blob], fileName, {type: blob.type});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title: fileName});
      showToast('הקובץ נשלח לשיתוף — בחרו "שמירה בקבצים" או Drive');
      return;
    }
  }catch(err){
    if(err && err.name === 'AbortError') return;
  }

  try{
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=> URL.revokeObjectURL(url), 4000);
    showToast('קובץ האקסל יוצא בהצלחה');
  }catch(err){
    showToast('לא ניתן לייצא כאן — נסו לפתוח את הטופס בספארי');
  }
}

async function saveToDrive(){
  if(typeof XLSX === 'undefined'){
    showToast('שגיאה בטעינת ספריית האקסל');
    return;
  }
  const driveBtn = document.getElementById('driveBtn');
  driveBtn.disabled = true;
  const originalText = driveBtn.textContent;
  driveBtn.textContent = 'שולח לדרייב...';
  try{
    const {wb, fileName} = buildWorkbook();
    const base64 = XLSX.write(wb, {bookType:'xlsx', type:'base64'});
    const payload = JSON.stringify({
      base64: base64,
      mimeType: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
      filename: fileName,
      folderId: '18DVRRiMVruWLs1lQnT0XOaNcs0QeSX8s'
    });
    await fetch(DRIVE_WEBHOOK_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'text/plain;charset=utf-8'},
      body: payload
    });
    showToast('הקובץ נשלח לתיקייה בדרייב');
  }catch(err){
    showToast('שגיאה בשליחה לדרייב — נסו שוב');
  }finally{
    driveBtn.disabled = false;
    driveBtn.textContent = originalText;
  }
}

async function init(){
  document.getElementById('brandLogo').src = LOGO_BASE64;
  document.getElementById('inpDate').value = todayISO();
  resetData();
  renderTabsBar();
  renderSections();
  renderSignatures();
  await refreshHistory();
  await loadEntry(todayISO());
  loadDataIntoForm();

  document.getElementById('inpDate').addEventListener('change', async ()=>{
    await loadEntry(currentDateKey());
    loadDataIntoForm();
    document.getElementById('historySelect').value = currentDateKey();
  });

  document.getElementById('historySelect').addEventListener('change', async (e)=>{
    if(!e.target.value) return;
    document.getElementById('inpDate').value = e.target.value;
    await loadEntry(e.target.value);
    loadDataIntoForm();
  });

  document.getElementById('newBtn').addEventListener('click', ()=>{
    resetData();
    loadDataIntoForm();
    showToast('טופס חדש נפתח');
  });

  document.getElementById('saveBtn').addEventListener('click', saveEntry);
  document.getElementById('exportBtn').addEventListener('click', exportToExcel);
  document.getElementById('driveBtn').addEventListener('click', saveToDrive);
}

init();
</script>
